<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday P.Nickyy 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Dancing+Script:wght@700&family=Sarabun:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --pink: #FF6B9D;
    --purple: #C084FC;
    --deep: #1a0a2e;
    --glow: #ff9de2;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--deep);
    font-family: 'Sarabun', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ===== PAGE 1: CAKE ===== */
  #page1 {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 60%, #2d0050 0%, #0d0020 70%);
    transition: opacity 0.8s ease;
    z-index: 10;
  }
  #page1.fade-out { opacity: 0; pointer-events: none; }

  .stars {
    position: absolute; inset: 0; overflow: hidden;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity:0.2; transform:scale(1); }
    50% { opacity:1; transform:scale(1.3); }
  }

  .cake-title {
    font-family: 'Dancing Script', cursive;
    color: var(--gold);
    font-size: clamp(1.1rem,5vw,2.2rem);
    margin-bottom: clamp(10px, 3vh, 20px);
    text-shadow: 0 0 20px #ffd70099;
    animation: float 3s ease-in-out infinite;
    text-align: center;
    padding: 0 16px;
  }

  .cake-wrap {
    position: relative;
    cursor: pointer;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .cake-svg { width: clamp(200px, 75vw, 340px); filter: drop-shadow(0 0 30px #ff6b9d88); }

  .hint {
    margin-top: clamp(12px, 2vh, 24px);
    color: #ffb3d9;
    font-size: clamp(0.85rem, 3vw, 1rem);
    letter-spacing: 1px;
    animation: pulse 1.5s ease-in-out infinite;
    font-family: 'Sarabun', sans-serif;
    text-align: center;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* candles */
  .candle-group { cursor: pointer; }
  .flame { transition: opacity 0.3s; transform-origin: center bottom; animation: flicker 0.15s infinite alternate; }
  @keyframes flicker {
    0% { transform: scaleX(1) scaleY(1) rotate(-1deg); }
    100% { transform: scaleX(0.92) scaleY(1.08) rotate(1deg); }
  }
  .flame.out { opacity: 0; animation: none; }

  .smoke-particle {
    position: absolute;
    width: 6px; height: 6px;
    background: rgba(200,200,200,0.7);
    border-radius: 50%;
    pointer-events: none;
    animation: smokeUp 1.5s ease-out forwards;
  }
  @keyframes smokeUp {
    0% { transform: translateY(0) scale(1); opacity: 0.8; }
    100% { transform: translateY(-60px) scale(3); opacity: 0; }
  }

  .progress-bar-wrap {
    margin-top: clamp(10px, 2vh, 18px);
    width: clamp(180px, 70vw, 300px);
    height: 8px;
    background: rgba(255,255,255,0.15);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--gold));
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 10px var(--gold);
  }

  /* ===== PAGE 2: BIRTHDAY ===== */
  #page2 {
    position: fixed; inset: 0;
    opacity: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 40%, #1a0040 0%, #05001a 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 5;
    overflow: hidden;
    transition: opacity 1s ease;
  }
  #page2.visible { opacity: 1; pointer-events: all; }

  .confetti-canvas {
    position: absolute; inset: 0;
    pointer-events: none;
  }

  .bday-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; gap: clamp(10px, 2vh, 18px);
    padding: clamp(12px, 3vw, 20px) clamp(12px, 4vw, 20px);
    max-height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    width: 100%;
  }

  .hb-text {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 10vw, 5.5rem);
    background: linear-gradient(135deg, #FFD700, #FF6B9D, #C084FC, #FFD700);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 3s linear infinite, popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    text-shadow: none;
    line-height: 1.1;
    text-align: center;
  }
  .name-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 7vw, 3.8rem);
    color: var(--gold);
    text-shadow: 0 0 30px #ffd70088, 0 0 60px #ffd70044;
    animation: popIn 0.8s 0.3s cubic-bezier(0.34,1.56,0.64,1) both, glow 2s ease-in-out infinite;
    text-align: center;
  }
  @keyframes gradientShift {
    0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
  }
  @keyframes popIn {
    0%{opacity:0;transform:scale(0.5) rotate(-5deg)} 100%{opacity:1;transform:scale(1) rotate(0)}
  }
  @keyframes glow {
    0%,100%{text-shadow: 0 0 20px #ffd70088} 50%{text-shadow: 0 0 50px #ffd700cc, 0 0 80px #ff6b9d88}
  }

  /* Photo frames */
  .photos-row {
    display: flex; gap: clamp(10px, 3vw, 20px); justify-content: center; flex-wrap: wrap;
    animation: popIn 0.8s 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .photo-frame {
    position: relative;
    width: clamp(100px, 36vw, 180px);
    aspect-ratio: 3/4;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 0 3px var(--gold), 0 0 20px #ffd70066, 0 0 40px #ff6b9d44;
    animation: photoFloat 4s ease-in-out infinite;
  }
  .photo-frame:nth-child(2) { animation-delay: -2s; aspect-ratio: 4/5; }
  .photo-frame img { width:100%; height:100%; object-fit:cover; }
  .photo-shine {
    position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
    pointer-events:none;
  }
  @keyframes photoFloat {
    0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-8px) rotate(1deg)}
  }

  .gifts-row {
    display: flex; gap: clamp(8px, 3vw, 16px); justify-content: center;
    animation: popIn 0.8s 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .gift { font-size: clamp(1.6rem, 6vw, 3rem); animation: bounce 1s ease-in-out infinite; }
  .gift:nth-child(2){animation-delay:-0.3s}
  .gift:nth-child(3){animation-delay:-0.6s}
  .gift:nth-child(4){animation-delay:-0.9s}
  .gift:nth-child(5){animation-delay:-1.2s}
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

  .wish-text {
    font-family: 'Dancing Script', cursive;
    color: #ffb3d9;
    font-size: clamp(0.95rem, 4vw, 1.5rem);
    text-align: center;
    max-width: 90vw;
    line-height: 1.6;
    animation: popIn 0.8s 1.1s cubic-bezier(0.34,1.56,0.64,1) both;
    text-shadow: 0 0 10px #ff6b9d66;
    padding-bottom: 16px;
  }

  /* Fireworks canvas */
  #fireworks { position:fixed; inset:0; pointer-events:none; z-index:1; }
</style>
</head>
<body>

<!-- PAGE 1: CAKE -->

  <div class="progress-bar-wrap">

      <br>Happy Birthday 🎂💕
    </p>
  </div>
</div>

  starsContainer.appendChild(s);
}

// ===== CANDLE LOGIC =====
let blown = 0;
const total = 5;
const blownSet = new Set();

function blowCandle(id, svgX, svgY) {
  if(blownSet.has(id)) return;
  blownSet.add(id);
  blown++;

  const flame = document.getElementById('flame'+id);
  flame.classList.add('out');

  // Smoke effect (DOM overlay approximation)
  const bar = document.getElementById('progressBar');
  bar.style.width = (blown/total*100)+'%';

  if(blown >= total) {
    document.getElementById('hintText').textContent = '🎉 ดับเทียนครบแล้ว!';
    setTimeout(showPage2, 1200);
  }
}

function showPage2() {
  // Set images
  document.getElementById('photo1').src = 'data:image/jpeg;base64,'+IMG1_B64;
  document.getElementById('photo2').src = 'data:image/jpeg;base64,'+IMG2_B64;

  document.getElementById('page1').classList.add('fade-out');
  setTimeout(()=>{
    document.getElementById('page2').classList.add('visible');
    startFireworks();
    startConfetti();
  }, 800);
}

// ===== FIREWORKS =====
const fwCanvas = document.getElementById('fireworks');
const fwCtx = fwCanvas.getContext('2d');
fwCanvas.width = window.innerWidth;
fwCanvas.height = window.innerHeight;

const particles = [];
const colors = ['#FFD700','#FF6B9D','#C084FC','#FF8C00','#00E5FF','#FF4ECD','#7FFF00'];

function createFirework(x,y){
  const color = colors[Math.floor(Math.random()*colors.length)];
  const count = 60+Math.floor(Math.random()*40);
  for(let i=0;i<count;i++){
    const angle = (Math.PI*2/count)*i;
    const speed = 1.5+Math.random()*3;
    particles.push({
      x,y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      alpha:1,
      color,
      size: 1.5+Math.random()*2.5,
      decay: 0.012+Math.random()*0.01
    });
  }
}

let fwInterval;
function startFireworks(){
  fwInterval = setInterval(()=>{
    createFirework(
      80+Math.random()*(window.innerWidth-160),
      60+Math.random()*(window.innerHeight*0.6)
    );
  }, 700);
  animateFireworks();
}

function animateFireworks(){
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.04;
    p.vx*=0.98; p.vy*=0.98;
    p.alpha-=p.decay;
    if(p.alpha<=0){particles.splice(i,1);continue;}
    fwCtx.globalAlpha=p.alpha;
    fwCtx.fillStyle=p.color;
    fwCtx.beginPath();
    fwCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    fwCtx.fill();
  }
  fwCtx.globalAlpha=1;
  requestAnimationFrame(animateFireworks);
}

// ===== CONFETTI =====
const confCanvas = document.getElementById('confettiCanvas');
const confCtx = confCanvas.getContext('2d');
confCanvas.width = window.innerWidth;
confCanvas.height = window.innerHeight;

const confettiPieces = [];
function startConfetti(){
  for(let i=0;i<150;i++){
    confettiPieces.push({
      x: Math.random()*confCanvas.width,
      y: -Math.random()*confCanvas.height,
      w: 8+Math.random()*10,
      h: 4+Math.random()*6,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*Math.PI*2,
      rotV: (Math.random()-0.5)*0.1,
      vy: 1+Math.random()*2,
      vx: (Math.random()-0.5)*1.5
    });
  }
  animateConfetti();
}
function animateConfetti(){
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  for(const c of confettiPieces){
    c.y+=c.vy; c.x+=c.vx; c.rot+=c.rotV;
    if(c.y>confCanvas.height) c.y=-10;
    confCtx.save();
    confCtx.translate(c.x,c.y);
    confCtx.rotate(c.rot);
    confCtx.fillStyle=c.color;
    confCtx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    confCtx.restore();
  }
  requestAnimationFrame(animateConfetti);
}

window.addEventListener('resize',()=>{
  fwCanvas.width=confCanvas.width=window.innerWidth;
  fwCanvas.height=confCanvas.height=window.innerHeight;
});

// Ensure touch works on candle groups
document.querySelectorAll('.candle-group').forEach(g => {
  g.addEventListener('touchstart', function(e){
    e.preventDefault();
    const id = parseInt(this.dataset.id);
    blowCandle(id,0,0);
  }, {passive:false});
});
</script>
